services:
  database:
    image: mysql:8.0
    container_name: maskapai-db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-maskapai_production}
      MYSQL_USER: ${DB_USERNAME:-maskapai_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-production_secret_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-super_admin_root_password}
    ports:
      - "3306:3306"
    volumes:
      - volume-db:/var/lib/mysql
    networks:
      - network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: database
    expose:
      - "9000"
    volumes:
      - volume-web:/var/www/html
    depends_on:
      database:
        condition: service_healthy
    networks:
      - network

  loadbalancer:
    image: nginx:alpine
    container_name: maskapai-lb
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - volume-web:/var/www/html:ro
    depends_on:
      - web
    networks:
      - network

volumes:
  volume-db:
  volume-web:

networks:
  network:
    driver: bridge
