upstream laravel {
    server web:9000;
}

server {
    listen 80;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 64M;

    sub_filter '</html>' '<div style="position:fixed;bottom:12px;right:12px;background:#0f172acc;color:#fff;padding:8px 14px;border-radius:8px;font:600 12px sans-serif">LB: $upstream_addr</div></html>';
    sub_filter_once on;
    sub_filter_types text/html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass laravel;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 120;
    }

    location ~ /\. {
        deny all;
    }
}
